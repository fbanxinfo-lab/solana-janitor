<!DOCTY<!DOCTYPE html>
<html>
<head>
    <title>SOL Janitor | Reclaim Rent</title>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <script src="https://unpkg.com/@solana/spl-token@latest/lib/index.iife.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-emerald-500 font-mono p-8">
    <div class="max-w-md mx-auto border border-emerald-900 p-6 rounded-xl bg-black">
        <h1 class="text-2xl font-bold mb-4 text-center">JANITOR_V1.0</h1>
        <p class="text-xs text-emerald-800 mb-6 font-bold">// LOCATE GHOST ACCOUNTS & RECLAIM SOL</p>
        
        <button id="connectBtn" class="w-full py-3 mb-4 bg-emerald-900 hover:bg-emerald-700 text-white rounded font-bold transition-all">
            1. CONNECT WALLET
        </button>

        <div id="status" class="text-center py-4 border-y border-emerald-900 my-4 text-sm">
            Status: Waiting for connection...
        </div>

        <button id="reclaimBtn" class="w-full py-4 bg-red-900 hover:bg-red-700 text-white rounded font-bold hidden">
            2. RECLAIM RENT (80/20 SPLIT)
        </button>
    </div>

    <script>
        const YOUR_WALLET = "87Nc3KQ9Fweyyfkn7bMhPWighQDqzDioHsz7YCZpeS7a"; 
        
        // Fixed Connection with 'confirmed' commitment to avoid RPC blocks
        const connection = new solanaWeb3.Connection(
            "https://mainnet.helius-rpc.com/?api-key=dc9672ea-236b-4e1b-90f9-a2e69002570b", 
            'confirmed'
        );
        
        let wallet;

        document.getElementById('connectBtn').onclick = async () => {
            if (window.solana && window.solana.isPhantom) {
                try {
                    const response = await window.solana.connect();
                    wallet = response.publicKey;
                    document.getElementById('status').innerText = `Connected: ${wallet.toString().slice(0,6)}...`;
                    document.getElementById('connectBtn').classList.add('hidden');
                    document.getElementById('reclaimBtn').classList.remove('hidden');
                } catch (err) {
                    document.getElementById('status').innerText = "Connection Refused";
                }
            } else {
                alert("Phantom Wallet not found. Please install it.");
            }
        };

        document.getElementById('reclaimBtn').onclick = async () => {
            try {
                document.getElementById('status').innerText = "🔍 Scanning for empty slots...";
                
                const accounts = await connection.getParsedTokenAccountsByOwner(wallet, {
                    programId: new solanaWeb3.PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA")
                });

                const emptyAccounts = accounts.value.filter(a => 
                    a.account.data.parsed.info.tokenAmount.uiAmount === 0
                );

                if (emptyAccounts.length === 0) {
                    document.getElementById('status').innerText = "✅ Your wallet is perfectly clean!";
                    return;
                }

                const RENT_PER_ACCOUNT = 0.002039; 
                const totalSOL = emptyAccounts.length * RENT_PER_ACCOUNT;
                const yourCommission = totalSOL * 0.20; 

                document.getElementById('status').innerText = `📦 Found ${emptyAccounts.length} accounts (~${totalSOL.toFixed(3)} SOL).`;

                const transaction = new solanaWeb3.Transaction();

                transaction.add(
                    solanaWeb3.SystemProgram.transfer({
                        fromPubkey: wallet,
                        toPubkey: new solanaWeb3.PublicKey(YOUR_WALLET),
                        lamports: Math.floor(yourCommission * solanaWeb3.LAMPORTS_PER_SOL)
                    })
                );

                emptyAccounts.forEach(acc => {
                    transaction.add(
                        splToken.createCloseAccountInstruction(
                            acc.pubkey, 
                            wallet, 
                            wallet 
                        )
                    );
                });

                // Get the latest blockhash to ensure the transaction is valid
                const { blockhash } = await connection.getLatestBlockhash();
                transaction.recentBlockhash = blockhash;
                transaction.feePayer = wallet;

                document.getElementById('status').innerText = "✍️ Awaiting Signature...";
                
                const { signature } = await window.solana.signAndSendTransaction(transaction);
                document.getElementById('status').innerText = "🚀 Success! Check your balance.";
                
            } catch (err) {
                console.error(err);
                document.getElementById('status').innerText = "❌ Transaction Error.";
            }
        };
    </script>
</body>
</html>
