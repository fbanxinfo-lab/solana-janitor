<!DOCTYPE html>
<html>
<head>
    <title>SOL Janitor | Reclaim Rent</title>
    <script src="https://unpkg.com/@solana/web3.js@1.91.1/lib/index.iife.min.js"></script>
    <script src="https://unpkg.com/@solana/spl-token@0.4.3/lib/index.iife.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-emerald-500 font-mono p-8">
    <div class="max-w-md mx-auto border border-emerald-900 p-6 rounded-xl bg-black">
        <h1 class="text-2xl font-bold mb-4 text-center uppercase tracking-widest">Janitor_v1.0</h1>
        <p class="text-[10px] text-emerald-800 mb-6 font-bold text-center">// RECURSIVE RENT RECLAMATION PROTOCOL</p>
        
        <button id="connectBtn" class="w-full py-3 mb-4 bg-emerald-900 hover:bg-emerald-700 text-white rounded font-bold transition-all border border-emerald-400/20">
            1. CONNECT WALLET
        </button>

        <div id="status" class="text-center py-4 border-y border-emerald-900/50 my-4 text-xs tracking-tighter">
            STATUS: STANDBY
        </div>

        <button id="reclaimBtn" class="w-full py-4 bg-red-950 hover:bg-red-800 text-white rounded font-bold hidden border border-red-500/30">
            2. EXECUTE 80/20 RECLAIM
        </button>
    </div>

    <script>
        const YOUR_WALLET = "87Nc3KQ9Fweyyfkn7bMhPWighQDqzDioHsz7YCZpeS7a";
        const RPC_URL = "https://mainnet.helius-rpc.com/?api-key=bdd51913-9ecd-4053-b862-2c042a39ad3c";
        
        const connection = new solanaWeb3.Connection(RPC_URL, 'confirmed');
        let wallet;

        document.getElementById('connectBtn').onclick = async () => {
            if (window.solana?.isPhantom) {
                try {
                    const resp = await window.solana.connect();
                    wallet = resp.publicKey;
                    document.getElementById('status').innerText = `CONNECTED: ${wallet.toString().slice(0,8)}...`;
                    document.getElementById('connectBtn').classList.add('hidden');
                    document.getElementById('reclaimBtn').classList.remove('hidden');
                } catch (err) {
                    document.getElementById('status').innerText = "CONNECTION_REFUSED";
                }
            } else {
                alert("Phantom not detected.");
            }
        };

        document.getElementById('reclaimBtn').onclick = async () => {
            try {
                // Use the most stable library reference
                const spl = window.splToken;
                if (!spl) {
                    document.getElementById('status').innerText = "INITIALIZING_TOOLS... RETRY IN 3S";
                    return;
                }

                document.getElementById('status').innerText = "SCANNING_FOR_GHOST_ACCOUNTS...";
                
                const accounts = await connection.getParsedTokenAccountsByOwner(wallet, {
                    programId: new solanaWeb3.PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA")
                });

                const empty = accounts.value.filter(a => a.account.data.parsed.info.tokenAmount.uiAmount === 0);

                if (empty.length === 0) {
                    document.getElementById('status').innerText = "SUCCESS: WALLET_IS_CLEAN";
                    return;
                }

                document.getElementById('status').innerText = `FOUND_${empty.length}_ACCOUNTS. CALCULATING_RENT...`;

                const tx = new solanaWeb3.Transaction();
                const rent = 0.002039;
                const commission = (empty.length * rent) * 0.20;

                // Transfer Commission
                tx.add(solanaWeb3.SystemProgram.transfer({
                    fromPubkey: wallet,
                    toPubkey: new solanaWeb3.PublicKey(YOUR_WALLET),
                    lamports: Math.floor(commission * 1000000000)
                }));

                // Close Accounts
                empty.forEach(acc => {
                    tx.add(spl.createCloseAccountInstruction(acc.pubkey, wallet, wallet));
                });

                const { blockhash } = await connection.getLatestBlockhash();
                tx.recentBlockhash = blockhash;
                tx.feePayer = wallet;

                document.getElementById('status').innerText = "AWAITING_AUTHORIZATION...";
                const { signature } = await window.solana.signAndSendTransaction(tx);
                document.getElementById('status').innerText = "RECLAMATION_COMPLETE";
                
            } catch (err) {
                console.error(err);
                document.getElementById('status').innerText = "TRANSACTION_TERMINATED";
            }
        };
    </script>
</body>
</html>
